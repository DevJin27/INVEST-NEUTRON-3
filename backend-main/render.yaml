services:
  - type: web
    name: auction-game-server
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://invest-neutron-3.vercel.app"
      - key: ROUND_DURATION_MS
        value: 10000
      - key: TOTAL_ROUNDS
        value: 6
